    <circle cx="1320" cy="180" r="2"/>
    <circle cx="1180" cy="260" r="2"/>
    <circle cx="1380" cy="280" r="3"/>
    <circle cx="1240" cy="320" r="2"/>
  </g>
  <g stroke="#0cf293" stroke-width="2" fill="none" stroke-linecap="round">
    <path d="M180 540 q 60 -60 120 0 t 120 0 t 120 0"/>
    <path d="M180 600 q 60 -60 120 0 t 120 0 t 120 0" stroke-opacity="0.6"/>
    <path d="M180 480 q 60 -60 120 0 t 120 0 t 120 0" stroke-opacity="0.4"/>
  </g>
  <g fill="#ffffff" fill-opacity="0.04">
